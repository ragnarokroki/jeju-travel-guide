<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주도 여행 가이드 | Jeju Travel Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --jeju: #00695C;
  --jeju-light: #E0F2F1;
  --jeju-city: #1565C0;
  --west: #2E7D32;
  --south: #BF360C;
  --east: #6A1B9A;
  --sand: #FAF8F3;
  --ink: #1A1A1A;
  --muted: #6B7280;
  --border: #E5E7EB;
  --card-bg: #FFFFFF;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--sand);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HERO ── */
.hero {
  background: linear-gradient(160deg, #004D40 0%, #00695C 45%, #00897B 100%);
  padding: 64px 24px 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero-badge {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.9);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  margin-bottom: 20px;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  color: #fff;
  line-height: 1.15;
  margin-bottom: 10px;
}
.hero h1 em {
  font-style: italic;
  color: #A7FFEB;
}
.hero-sub {
  color: rgba(255,255,255,0.75);
  font-size: 15px;
  font-weight: 300;
  margin-bottom: 36px;
}
.hero-stats {
  display: flex; justify-content: center; gap: 32px; flex-wrap: wrap;
}
.stat {
  text-align: center;
}
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  color: #A7FFEB;
  font-weight: 700;
  line-height: 1;
}
.stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ── TOOLBAR ── */
.toolbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,248,243,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search-wrap {
  position: relative; flex: 1; min-width: 200px; max-width: 320px;
}
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; color: var(--muted);
}
#search {
  width: 100%; padding: 9px 12px 9px 36px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  background: #fff; color: var(--ink); outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--jeju); }
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  padding: 7px 14px; border-radius: 8px; font-size: 13px;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
  border: 1.5px solid var(--border); background: #fff;
  cursor: pointer; transition: all .2s; white-space: nowrap;
  color: var(--muted);
}
.filter-btn:hover { border-color: var(--jeju); color: var(--jeju); }
.filter-btn.active { background: var(--jeju); border-color: var(--jeju); color: #fff; }
.filter-btn[data-region="제주시"].active { background: var(--jeju-city); border-color: var(--jeju-city); }
.filter-btn[data-region="서부"].active { background: var(--west); border-color: var(--west); }
.filter-btn[data-region="남부"].active { background: var(--south); border-color: var(--south); }
.filter-btn[data-region="동부"].active { background: var(--east); border-color: var(--east); }
.count-badge {
  margin-left: auto; font-size: 13px; color: var(--muted);
  white-space: nowrap;
}

/* ── MAIN ── */
.main { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; }

/* ── REGION SECTION ── */
.region-section { margin-bottom: 60px; }
.region-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 28px; padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
}
.region-dot {
  width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
}
.region-title-ko {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.5rem; font-weight: 700; color: var(--ink);
}
.region-title-en {
  font-size: 13px; color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase; font-weight: 400;
}
.region-cnt {
  margin-left: auto; font-size: 13px; color: var(--muted);
}

/* ── CARD GRID ── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  transition: transform .22s ease, box-shadow .22s ease;
  cursor: pointer;
  display: flex; flex-direction: column;
  animation: fadeUp .4s ease both;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.09);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-accent {
  height: 4px; width: 100%;
}
.card-body { padding: 18px 18px 16px; flex: 1; display: flex; flex-direction: column; }
.card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.card-num {
  min-width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.card-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 1rem; font-weight: 700; color: var(--ink);
  line-height: 1.35; flex: 1;
}
.card-cat {
  display: inline-flex; align-items: center;
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  font-weight: 500; flex-shrink: 0; margin-top: 2px;
}
.cat-spot { background: #E8F5E9; color: #2E7D32; }
.cat-culture { background: #E3F2FD; color: #1565C0; }
.card-desc {
  font-size: 13px; color: #4B5563; line-height: 1.65;
  margin-bottom: 12px; flex: 1;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.card-footer {
  border-top: 1px solid #F3F4F6;
  padding-top: 12px;
  display: flex; flex-direction: column; gap: 5px;
}
.card-meta {
  display: flex; align-items: flex-start; gap: 6px;
  font-size: 12px; color: var(--muted);
}
.card-meta svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; }
.card-meta span { line-height: 1.4; }

/* ── EMPTY ── */
.empty {
  text-align: center; padding: 80px 20px; color: var(--muted);
  display: none;
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty h3 { font-size: 1.1rem; margin-bottom: 6px; }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  z-index: 200; display: none; align-items: center; justify-content: center;
  padding: 24px;
}
.overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 20px;
  max-width: 560px; width: 100%; max-height: 85vh;
  overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.18);
  animation: modalIn .25s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-header {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.modal-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 10px;
  font-size: 13px; font-weight: 700; color: #fff;
  margin-bottom: 12px;
}
.modal-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.4rem; font-weight: 700; color: var(--ink);
  line-height: 1.3; margin-bottom: 8px;
}
.modal-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.modal-tag {
  font-size: 11px; padding: 3px 10px; border-radius: 4px;
  font-weight: 500;
}
.close-btn {
  position: absolute; top: 20px; right: 20px;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: #fff;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--muted); line-height: 1;
}
.close-btn:hover { background: #F3F4F6; }
.modal-body { padding: 24px 28px 28px; }
.modal-desc {
  font-size: 14.5px; color: #374151; line-height: 1.8;
  margin-bottom: 20px;
}
.modal-info-grid { display: flex; flex-direction: column; gap: 10px; }
.modal-info-row {
  display: flex; gap: 10px; font-size: 13px;
}
.info-label {
  min-width: 64px; font-weight: 600; color: var(--ink);
}
.info-val { color: #4B5563; line-height: 1.5; }

/* ── FOOTER ── */
footer {
  text-align: center; padding: 32px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}

.hidden { display: none !important; }
</style>
</head>

  </div>` : '';
  const feeHtml = p.fee ? `<div class="card-meta">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
    <span>${p.fee}</span>
  </div>` : '';
  return `<div class="card" onclick="openModal(${p.no})">
    <div class="card-accent" style="background:${c}"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-num" style="background:${c}">${p.no}</div>
        <div>
          <div class="card-name">${p.name}</div>
          <span class="card-cat ${catClass}">${p.category} · ${catEn}</span>
        </div>
      </div>
      <p class="card-desc">${p.desc || '상세 정보를 확인하세요.'}</p>
      <div class="card-footer">
        <div class="card-meta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>${p.address}</span>
        </div>
        ${hoursHtml}${feeHtml}
      </div>
    </div>
  </div>`;
}

function render() {
  const pts = filtered();
  const main = document.getElementById('main-content');
  const empty = document.getElementById('empty-state');
  document.getElementById('count-badge').textContent = pts.length + '곳';

  if (pts.length === 0) {
    main.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  if (activeRegion !== '전체' || searchQ) {
    main.innerHTML = `<div class="card-grid">${pts.map(cardHtml).join('')}</div>`;
  } else {
    let html = '';
    for (const reg of REGION_ORDER) {
      const regPts = pts.filter(p => p.region === reg);
      if (regPts.length === 0) continue;
      const c = regionColor(reg);
      html += `<section class="region-section" data-region="${reg}">
        <div class="region-header">
          <div class="region-dot" style="background:${c}"></div>
          <div>
            <div class="region-title-ko">${reg}</div>
            <div class="region-title-en">${REGION_EN[reg]}</div>
          </div>
          <div class="region-cnt">${regPts.length}곳</div>
        </div>
        <div class="card-grid">${regPts.map(cardHtml).join('')}</div>
      </section>`;
    }
    main.innerHTML = html;
  }
}

function openModal(no) {
  const p = PLACES.find(x => x.no === no);
  if (!p) return;
  const c = regionColor(p.region);
  document.getElementById('m-num').style.background = c;
  document.getElementById('m-num').textContent = p.no;
  document.getElementById('m-name').textContent = p.name;
  document.getElementById('m-tags').innerHTML = `
    <span class="modal-tag" style="background:${c}20;color:${c}">${p.region}</span>
    <span class="modal-tag ${p.category==='관광지'?'cat-spot':'cat-culture'}">${p.category}</span>`;
  document.getElementById('m-desc').textContent = p.desc || '상세 정보를 확인하세요.';
  let info = `<div class="modal-info-row"><span class="info-label">주소</span><span class="info-val">${p.address}</span></div>`;
  if (p.hours) info += `<div class="modal-info-row"><span class="info-label">운영시간</span><span class="info-val">${p.hours}</span></div>`;
  if (p.fee) info += `<div class="modal-info-row"><span class="info-label">입장료</span><span class="info-val">${p.fee}</span></div>`;
  document.getElementById('m-info').innerHTML = info;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelectorAll('.filter-btn[data-region]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-region]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRegion = btn.dataset.region;
    render();
  });
});
document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      activeCat = '전체';
    } else {
      document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
    }
    render();
  });
});
document.getElementById('search').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  render();
});

render();
</script>
</body>
</html>
