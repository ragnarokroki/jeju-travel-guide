<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주도 여행 가이드 | Jeju Travel Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --jeju: #00695C;
  --jeju-city: #1565C0;
  --west: #2E7D32;
  --south: #BF360C;
  --east: #6A1B9A;
  --sand: #FAF8F3;
  --ink: #1A1A1A;
  --muted: #6B7280;
  --border: #E5E7EB;
  --card-bg: #FFFFFF;
  --radius: 14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;}

.hero{background:linear-gradient(160deg,#004D40 0%,#00695C 45%,#00897B 100%);padding:64px 24px 80px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.hero-badge{display:inline-block;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);margin-bottom:20px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,6vw,3.8rem);color:#fff;line-height:1.15;margin-bottom:10px;}
.hero h1 em{font-style:italic;color:#A7FFEB;}
.hero-sub{color:rgba(255,255,255,0.75);font-size:15px;font-weight:300;margin-bottom:36px;}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:#A7FFEB;font-weight:700;line-height:1;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

.toolbar{position:sticky;top:0;z-index:100;background:rgba(250,248,243,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);}
#search{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;background:#fff;color:var(--ink);outline:none;transition:border-color .2s;}
#search:focus{border-color:var(--jeju);}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;white-space:nowrap;color:var(--muted);}
.filter-btn:hover{border-color:var(--jeju);color:var(--jeju);}
.filter-btn.active{background:var(--jeju);border-color:var(--jeju);color:#fff;}
.filter-btn[data-region="제주시"].active{background:var(--jeju-city);border-color:var(--jeju-city);}
.filter-btn[data-region="서부"].active{background:var(--west);border-color:var(--west);}
.filter-btn[data-region="남부"].active{background:var(--south);border-color:var(--south);}
.filter-btn[data-region="동부"].active{background:var(--east);border-color:var(--east);}
.count-badge{margin-left:auto;font-size:13px;color:var(--muted);white-space:nowrap;}

.main{max-width:1280px;margin:0 auto;padding:40px 24px 80px;}

.region-section{margin-bottom:60px;}
.region-header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid var(--border);}
.region-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.region-title-ko{font-family:'Noto Serif KR',serif;font-size:1.5rem;font-weight:700;color:var(--ink);}
.region-title-en{font-size:13px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:400;}
.region-cnt{margin-left:auto;font-size:13px;color:var(--muted);}

.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:transform .22s ease,box-shadow .22s ease;cursor:pointer;display:flex;flex-direction:column;animation:fadeUp .4s ease both;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.09);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card-accent{height:4px;width:100%;}
.card-body{padding:18px 18px 16px;flex:1;display:flex;flex-direction:column;}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.card-num{min-width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.card-name{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:700;color:var(--ink);line-height:1.35;flex:1;}
.card-cat{display:inline-flex;align-items:center;font-size:11px;padding:3px 8px;border-radius:4px;font-weight:500;flex-shrink:0;margin-top:2px;}
.cat-spot{background:#E8F5E9;color:#2E7D32;}
.cat-culture{background:#E3F2FD;color:#1565C0;}
.card-desc{font-size:13px;color:#4B5563;line-height:1.65;margin-bottom:12px;flex:1;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-footer{border-top:1px solid #F3F4F6;padding-top:12px;display:flex;flex-direction:column;gap:5px;}
.card-meta{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--muted);}
.card-meta svg{width:13px;height:13px;flex-shrink:0;margin-top:1px;}
.card-meta span{line-height:1.4;}

.empty{text-align:center;padding:80px 20px;color:var(--muted);display:none;}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty h3{font-size:1.1rem;margin-bottom:6px;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:20px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.18);animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(0.95) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-header{padding:28px 28px 20px;border-bottom:1px solid var(--border);position:relative;}
.modal-num{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;margin-bottom:12px;}
.modal-name{font-family:'Noto Serif KR',serif;font-size:1.4rem;font-weight:700;color:var(--ink);line-height:1.3;margin-bottom:8px;}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;}
.modal-tag{font-size:11px;padding:3px 10px;border-radius:4px;font-weight:500;}
.close-btn{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);line-height:1;}
.close-btn:hover{background:#F3F4F6;}
.modal-body{padding:24px 28px 28px;}
.modal-desc{font-size:14.5px;color:#374151;line-height:1.8;margin-bottom:20px;}
.modal-info-grid{display:flex;flex-direction:column;gap:10px;}
.modal-info-row{display:flex;gap:10px;font-size:13px;}
.info-label{min-width:64px;font-weight:600;color:var(--ink);}
.info-val{color:#4B5563;line-height:1.5;}
.map-link{display:inline-flex;align-items:center;gap:6px;margin-top:16px;padding:9px 16px;border-radius:8px;background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;font-size:13px;font-weight:500;text-decoration:none;transition:background .2s;}
.map-link:hover{background:#dcfce7;}

footer{text-align:center;padding:32px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);}
</style>
</head>

64,"no":18},{"name":"용담레포츠공원","address":"제주특별자치도 제주시 서해안로 580 (용담삼동)","region":"제주시","category":"관광지","desc":"용담 레포츠공원은 제주시민들의 건강한 레저와 스포츠, 여가활동을 위해 조성된 공원이다. 다양한 활동이 가능한 다목적 운동장, 족구장, 배구장, 롤러스케이트장, 농구장 등의 체육시설과 정자, 쉼터 등 편의시설이 잘 갖춰져 있어 운동이나 가벼운 산책하기에 좋은 공원이다.","hours":"상시 개방","fee":"","lat":33.5182668053,"lng":126.4994525928,"no":19},{"name":"가새기오름","address":"제주시 오라삼동2848","region":"제주시","category":"관광지","desc":"가새기오름은 오라동 연미마을 북서쪽에 가로누운 자그마한 화구 없는 원추형 화산체로서, 남북으로 긴 등성이에 해송이 우거져 숲을 이루고 있다. 풍수설에 의하면 이 오름 남쪽에 있는 민오름이 개의 형국이고, 그 밑에 있는 이 오름은 어미개에 딸린 강아지의 형국이라는 것에서 [개새끼오름]이라 불리고 있다. 어미개와 강아지가 어울린 모습에 개의 젖가슴을 상징하는 ","hours":"상시 개방","fee":"무료","lat":33.4893700755,"lng":126.5038611983,"no":20},{"name":"용연구름다리","address":"제주특별자치도 제주시 용담이동2581","region":"제주시","category":"관광지","desc":"용연구름다리는 제주공항 서쪽에 위치한 다리이다. 용연은 제주시 용담동에 위치한 계곡의 물이 유입되는 하천으로, 산등성이부터 바닷가로 흘러 바닷물과 민물이 만나 신비로움을 선사한다.","hours":"상시 개방","fee":"","lat":33.5149285237,"lng":126.5143124879,"no":21},{"name":"용담공원","address":"제주특별자치도 제주시 용담일동373-5","region":"제주시","category":"관광지","desc":"용담공원은 용두암 근처에 있는 작은 공원으로, 용연 다리와도 연결된 도심 속의 자그마한 쉼터이다. 근처 관광지인 용두암은 기암괴석 사이에 있는 용머리 모양의 관광 명소이며, 용연 다리는 용담 공원과 건너편을 잇는 거대한 출렁다리다.","hours":"상시 개방","fee":"","lat":33.5081292873,"lng":126.5150125811,"no":22},{"name":"제주아트센터","address":"제주특별자치도 제주시 오남로 231 제주아트센터","region":"제주시","category":"문화시설","desc":"2010년 5월에 개관한 제주아트센터는 총 1,184석의 객석과 첨단 시설을 갖춘 다목적 공연장이다. 오케스트라 피트가 준비되어 있어 정통 클래식 공연에 오케스트라와 협연을 통한 최고의 공연을 보여줄 수 있으며 최신 음향, 조명, 무대 시스템을 갖추고 있어 뮤지컬, 연극, 무용 등 다양한 장르의 공연을 소화할 수 있다.","hours":"공연에 따라 다름 (홈페이지 참조)","fee":"","lat":33.4751107281,"lng":126.5155327293,"no":23},{"name":"방선문","address":"제주시 오라이동39-1","region":"제주시","category":"관광지","desc":"제주시를 관통하는 한천 상류 약 6km 지점에 효성이 지극한 나무꾼이 신선을 만났다는 전설을 가진 방선문(訪仙門)이 있다. 전설에 의하면 방선문은 신선 세계로 통하는 문으로 신선 세계와 인간 세계의 경계이다. 옛날 백록담에서는 매년 복날이면 하늘에서 선녀들이 내려와 목욕했는데 이때마다 한라산 산신은 방선문 밖 인간세계로 나와 선녀들이 하늘로 돌아갈 때까지 ","hours":"상시 개방","fee":"무료","lat":33.4542936092,"lng":126.5169053039,"no":24},{"name":"제주문학관"," ":"제주시","category":"관광지","desc":"우도는 소가 누워있는 모양을 닮았다고 해서 일찍부터 소섬 또는 쉐섬으로 불리웠다. 완만한 경사와 옥토, 풍부한 어장, 우도팔경 등 천혜의 자연조건을 갖춘 관광지로써 한해 약 200만 명의 관광객이 찾는 제주의 대표적인 부속섬이다.","hours":"상시 개방","fee":"","lat":33.51192218763324,"lng":126.96480936059388,"no":94},{"name":"우도 등대","address":"제주특별자치도 제주시 우도면 우도봉길 105(우도면) 부근","region":"제주시","category":"관광지","desc":"우도 등대는 제주 최초로 빛을 밝힌 등대로, 1906년 3월 처음 불을 밝혔다. 2003년 12월, 높이 16m의 원형 콘크리트 등대를 신축하였고, 국내 기술로 개발한 대형 회전식 등명기를 설치해 50㎞ 밖에서도 확인 가능한 불빛을 비추고 있다.","hours":"09:00~18:00","fee":"","lat":33.4920855483,"lng":126.9665931996,"no":95},{"name":"검멀레해변","address":"제주 제주시 우도면 연평리","region":"제주시","category":"관광지","desc":"검멀레 해수욕장은 제주도 동쪽 끝 성산포에서 북동쪽 해상에 위치한 화산섬 우도에 있는 유명한 해수욕장이다. 우도봉 아래에 협곡 속에 숨어있다. 폭 1백 여 미터의 작은 해변이지만 모래찜질을 겸한 해수욕을 할 수 있는 장소이다. 도로에서 해변은 계단으로 연결되어 있다. 검멀레의 검은 검다, 멀레는 모래라는 뜻으로, 검은 모래 해변을 뜻한다. 해변 끝에는 고래","hours":"상시 개방","fee":"무료","lat":33.497279,"lng":126.967248,"no":96},{"name":"에코그린리조트","address":"제주특별자치도 제주시 한림읍 귀덕6길 94","region":"서부","category":"관광지","desc":"에코그린리조트는 제주도 한림읍 귀덕리에 위치해 있으며 호텔급 리조트 객실, 실내풀장이 갖춰진 풀빌라를 겸비한 복합형 테마 리조트 & 풀빌라이다. 바다와 한라산이 보이도록 디자인된 객실과 더불어 휴향 리조트로 4계절 내내 비즈니스 미팅, 결혼식, 각종모임은 물론 연인, 가족이 함께 즐기기에 손색이 없다.","hours":"","fee":"","lat":33.4353226964,"lng":126.2914864404,"no":97},{"name":"금산공원(납읍난대림지대)","address":"제주시 애월읍 납읍리","region":"서부","category":"관광지","desc":"제주시 애월읍 납읍리 마을에 인접하여 약 일 만평에 이르는 넓은 면적에 속칭 ‘금산공원’이라 불리는 곳에 울창한 상록수림이 있다. 이곳은 자연림의 원형을 보존하고 있는 표본지역으로 원식생 연구에 기초적인 자료를 제공하고 있다. 때문에 학술 자원으로서 가치가 높고, 문화재보호법에서 천연기념물로 지정, 보호되고 있는 납읍난대림지대이다. 이곳은 제주시의 서부 지","hours":"상시 개방","fee":"","lat":33.4338648460439,"lng":126.330699357454,"no":98},{"name":"아이바가든","address":"제주특별자치도 제주시 애월읍 고성남서길 10","region":"서부","category":"문화시설","desc":"제주 서쪽 애월에 위치한 아이바가든은 미디어 전시관을 넘어, 현대적인 감각으로 디자인된 복합문화공간이다. 아이바가든은 9개의 독특한 테마로 구성된 미디어 전시관과 함께 아트갤러리, 라이브공연, 카페, 한식뷔페가 있는 제주 실내 관광지로 가족과 연인 모두에게 잊지 못할 추억을 선사한다.","hours":"09:00~19:00","fee":"","lat":33.4336471658,"lng":126.4220751222,"no":99},{"name":"테디베어하우스 테지움","address":"제주특별자치도 "노리매는 순우리말 '놀이'와 매화의 '매'가 합쳐져 만들어진 이름으로 자연 속에서 현대적 감성을 즐길 수 있는 자연공원이다. 수선화, 매화, 목련, 작약, 동백, 조팝나무 등 다양한 꽃과 나무들이 사시사철 화사한 자연을 만끽할 수 있고, 투박한 제주의 돌과 인공 폭포, 인공 호수 등은 자연과 사람이 만든 조형물이 어우러져 감각적인 모습의 공원이다.","hours":"09:00~18:00","fee":"","lat":33.2825728584,"lng":126.2873513183,"no":132},{"name":"피규어뮤지엄제주","address":"제주특별자치도 서귀포시 안덕면 한창로 243","region":"서부","category":"문화시설","desc":"눈을 뗄 수 없는 환상적인 피규어들이 가득한 피규어뮤지엄 제주에서는 액션피규어, 무비 스테츄, 실물크기 영화 캐릭터들의 대형 피규어들과 업사이클링 힐링아트 작품들은 물론 희귀하고 정교한 고퀄리티의 다양한 피규어들도 감상할 수 있다. 전 세대가 공감할 수 있는 영화, 게임, 애니메이션에 등장하는 친근한 피규어들이 가득하다.","hours":"09:30~18:00 (입장마감 17:00)","fee":"","lat":33.281971215,"lng":126.3553982011,"no":133},{"name":"소인국테마파크","address":"제주특별자치도 서귀포시 안덕면 화순서동로 347","region":"서부","category":"관광지","desc":"야외전시관의 쇼나조각상길을 따라 거닐고 바이올린 켜는 공룡을 만나고 인생샷을 남길 수 있으며 플라워 존을 지나 키즈존이 있는데 이곳에서 아이들과 휴식을 취할 수 있다. 별관에 들려 오락도 하고 아이스크림을 먹으면서 정원을 둘러보거나 송악산, 산방산, 단산, 군산의 정자에서 휴식을 취하며 그네를 탈 수 있다.","hours":"09:00~18:00 (입장 마감 17:00)","fee":"","lat":33.28158936731043,"lng":126.33207574662586,"no":134},{"name":"제주유리박물관","address":"제주특별자치도 서귀포시 중산간서로 1403(상예동)","region":"서부","category":"문화시설","desc":"제주유리박물관은 한국의 유일한 유리 전문 박물관으로 넓은 공간에 전시된 유리작품을 감상할 수 있는 공간이다. 2008년 3월 1일 제주도에 개관했으며 유리 전시실, 가마 작업실, 브로잉실, 유리 가공실, 강의실, 카페 등을 갖추고 있다.","hours":"10:00~18:00 (입장 마감 17:00)","fee":"","lat":33.2784468371,"lng":126.3701775526,"no":135},{"name":"점보빌리지","address":"제주특별자치도 서귀포시 안덕면 평화로319번길 31-11","region":"서부","category":"관광지","desc":"점보빌리지는 우리나라에서 가장 많은 코끼리들이 대가족을 이루어 함께 살고 있는 특별한 코끼리 마을이다. 이곳은 코끼리들이 자유롭게 휴식하고 생활하는 공간으로, 코끼리와 사람들이 함께 공존할 수 있도록 조성된 곳이다.","hours":"10:00~18:00","fee":"","lat":33.2763404987,"lng":126.3055443214,"no":136},{"name":"중문미로파크","address":"제주특별자치도 서귀포시 상예동 3592-5","region":"서부","category":"관광지","desc":"중문 미로파크는 사계절 푸르른 랠란디나무의 미로 속에서 길을 찾는 즐거움을 체험할 수 있는 공간으로 감귤 체험, 동물 친구들, 유채꽃밭과 제주의 신화와 역사, 황금사자의 이야기가 있는 곳이다. 이곳의 미로를 구성하는 나무는 랠란디 사이프러스(X cupressocyparis leylandii)로 흔히 랠란디라 칭한다.","hours":"09:00~18:00","fee":"","lat":33.2634799314062,"lng":126.3824011 알오름의 총면적은 약 29,094㎡이며, 둘레 704m, 높이 21m이다. 섯알오름 꼭대기에는 일제 강점기에 설치한 고사포 진지가 있고, 그 남쪽 기슭에는 제주 4·3 사건의 아픔을 간직한 학살터가 있다. 섯알오름 서","hours":"","fee":"무료","lat":33.2042091988,"lng":126.2815563372,"no":159},{"name":"송악산 진지동굴","address":"서귀포시 대정읍 상모리 238","region":"서부","category":"관광지","desc":"송악산 해안 절벽에 있는 인공 동굴로, 1945년 초 일본군이 연합군의 공격에 대비하거나 중국 침략을 목적으로 구축해 둔 동굴이다. 송악산 해안 절벽을 훼손해 가며 모두 15개의 인공 동굴을 뚫었고, 제주도민들을 강제 동원한 곳이기도 하다. 동굴 너비는 3~4m, 길이는 20여 m로 우리나라에서는 쉽게 찾아볼 수 없는 일제 강점기 군사시설이다. 동굴 안쪽에","hours":"상시 개방","fee":"무료","lat":33.1991210589,"lng":126.2935109685,"no":160},{"name":"송악산","address":"서귀포시 대정읍 송악관광로 421-1","region":"서부","category":"관광지","desc":"송악산은 한라산처럼 웅장하거나 산방산처럼 경치가 빼어나지는 않지만 송악산 정상에 오르면 앞으로 가까이 보이는 최남단의 마라도와 가파도, 형제섬, 우뚝 솟은 산방산, 멀리 보이는 한라산, 그리고 태평양 바다를 볼 수 있다. 송악산은 여러 개의 크고 작은 봉우리들이 모여 이루어져 있다. 주봉을 중심으로 하여 서북쪽은 넓고 평평한 초원지대이고 서너 개의 봉우리가","hours":"상시 개방","fee":"무료","lat":33.1989,"lng":126.2903,"no":161},{"name":"송악산전망대","address":"제주특별자치도 서귀포시 대정읍 상모리 2-13","region":"서부","category":"관광지","desc":"99개의 작은 봉우리가 모여 있다고 하여 99봉이라고도 불리는 송악산에는 3개의 전망대가 있어 주변의 빼어난 경치를 감상할 수 있다. 특히, 마라도와 가파도, 형제섬 그리고 한라산과 해안을 따라 펼쳐진 주변 경관을 감상할 수 있어 관광객들이 많이 찾는 곳이다.","hours":"상시 개방","fee":"","lat":33.1981045181,"lng":126.2943831374,"no":162},{"name":"가파도 소망전망대","address":"제주특별자치도 서귀포시 대정읍 가파리513","region":"서부","category":"관광지","desc":"제주도 부속섬 중 4번째로 큰 섬 가파도는 위에서 내려다보면 바다를 헤엄쳐 가는 가오리 모양을 하고 있다. 이름은 가오리(가파리)를 닮아 가파도가 되었다는 설과 덮개 모양을 닮아 개도(蓋島)로 부르던 것이 가파도라 굳어졌다는 설 등이 있다.","hours":"상시 개방","fee":"","lat":33.1688017961,"lng":126.2688165585,"no":163},{"name":"마라도 등대","address":"제주특별자치도 서귀포시 대정읍 마라로 (165, 마라도항로표지관리소)","region":"서부","category":"관광지","desc":"대한민국 국토 최남단에 있는 푸른 잔디밭 끝에 걸쳐 바다를 향하고 있는 마라도 등대는 동중국해와 제주도 남부 해역을 오가는 선박들이 육지 초인 표지로 이용하고 있는 우리나라의 희망봉 등대이다. 일제강점기인 1915년 3월 최초 건립된 등대는 1987년 3월에 개축하였고, 하얀색의 8각형 콘크리트 구조로 높이는 16m이다.","hours":"[마라도 등대]- 09:00~18:00[운진항 여객터미널] - 09:40~15:50[마라도 가는 여객선 / 산이수동항] - 09:20~16:10 ※ 사전 전화문의 필수","fee":"","lat":33.1170102919,"lng":126.2692287758,"no":164},{"name":"거린사슴전망대","address":"제주특별자치도 서귀포시 1100로 791 (대포동)","region":"남부","category":"관광지","desc":"거린사슴오름의 기슭에 있는 전망대이다. 1100도로 서귀포자연휴양림에서 서귀포 방면으로 내려가다 보면 있다.","hours":"상시 개방","fee":"","lat":33.3062367724,"lng":126.4550112359,"no":165},{"name":"법화사","address":"서귀포시 하원북로35번길 15-28 법화사","region":"남부","category":"관광지","desc":"법화사는 수정사와 함께 제주의 비보사찰(裨補寺刹)로써, 대한불교조계종 제23교구 본사 관음사의 말사이다. 건립 시기에 대해서는 고려 시대, 길게는 통일신라 시대까지도 올라간다는 주장이 있다. 고려 후기 몽골의 제주 지배기에 법화사는 더 중시되었다. 제주대학교 박물관 주도로 1992년부터 이루어진 발굴 조사에서 발굴된 기와에는 법화사가 원의지원 6년(1269","hours":"상시 개방","fee":"","lat":33.2652385684,"lng":126.4580035612,"no":166},{"name":"서귀포천문과학문화관","address":"제주특별자치도 서귀포시 1100로 506-1 천문과학문화관","region":"남부","category":"문화시설","desc":"서귀포천문과학문화관은 무병장수를 상징하는 별인 노인성을 관측하기에 최적의 장소로서 천문우주 관련 전시물들과 밤하늘의 천체 및 태양을 관측할 수 있는 천체 망원경들을 보유하고 있으며 아울러 가상의 밤하늘과 디지털 영상을 상영할 수 있는 천체 투영실을 갖추고 있다. 노인성은 무병장수를 상징하는 별로 겨울이 되면 서귀포시 밤하늘에서 관측할 수 있는 별이다.","hours":"14:00~22:00※ 월별 프로그램 시간이 다르므로 홈페이지 참조","fee":"","lat":33.2888776636,"lng":126.460411156,"no":167},{"name":"어리목탐방지원센터","address":"제주특별자치도 제주시 1100로 2070-61 (해안동)","region":"남부","category":"관광지","desc":"한라산어리목탐방안내소는 한라산 어리목 탐방로 주차장, 어승생악 입구 옆에 있다. 한라산 탐방 정보와 한라산의 탄생, 역사, 지질, 전설, 생태 등 이해를 돕기 위한 전시 공간으로 1~3전시실과 함께 어린이 체험학습장, 영상실, 포토존 등이 있다.","hours":"09:00~17:00","fee":"","lat":33.392172337,"lng":126.4939225924,"no":168},{"name":"제주도 관광특구","address":"제주특별자치도","region":"남부","category":"관광지","desc":"한반도의 남서해상에 위치하는 제주도는 특별자치도로 지정된 국내 최대의 관광 지역이다. 전 지역이 관광특구로 지정될 만큼 발길 닿는 곳마다 아름다운 자연 경관이 펼쳐진다.","hours":"상시 개방","fee":"","lat":33.391158595,"lng":126.4961418675,"no":169},{"name":"제주아이브리조트","address":"제주특별자치도 서귀포시 산록남로 1966-34 (영남동)","region":"남부","category":"관광지","desc":"지루하고 답답한 일상에서 벗어나 상쾌한 피톤치드로 둘러싸인 청정제주의 숲에서 편안한 쉼과 여유로운 추억을 남길 수 있는 제주 아이브리조트는 호텔형 자쿠지 객실과 핀란드산 독채 객실이 있는 유럽형 리조트이다. 기분 좋은 새소리를 들으며 상쾌한 아침을 맞이하고 쏟아지는 별들을 눈에 담을 수 있으며 북으로는 한라산이 감싸 안고 전 객실이 남향으로 배치되어 에메랄","hours":"","fee":"","lat":33.2887088265,"lng":126.4976384869,"no":170},{"name":"한국야구명예전당","address":"제주특별자치도 서귀포시 중산간서로 97-1(강정동)","region":"남부","category":"문화시설","desc":"서귀포 강창학체육공원 내에 위치한 한국야구명예전당은 1995년 개관한 야구 박물관이다. 서귀포에 다양한 야구 관련 시설을 설치하고 야구의 메카로 자리매김하겠다는 서귀포시의 의지에 당시 야구의 집을 운영하던 전 LG 트윈스 감독의 물품 기증이 합쳐져 박물관의 모습을 갖추게 됐다.","hours":"09:00~18:00 (입장 마감 17:30)","fee":"","lat":33.2605730556,"lng":126.4984223827,"no":171},{"name":"워터월드 제주","address":"제주특별자치도 서귀포시 월드컵로 33 (법환동)","region":"남부","category":"관광지","desc":"워터월드 제주는 국내 최초 '물'을 이용한 몰입형 미디어 테마파크로, 감각적인 미디어아트와 다채로운 콘텐츠를 선보인다. 총 12개의 테마 공간으로 구성되어 있으며, 독창적인 컨셉과 높은 퀄리티로 특별한 경험을 제공한다.","hours":"10:00~20:00 (입장 마감 19:00)","fee":"","lat":33.24648032376472,"lng":126.50681699336153,"no":172},{"name":"두머니물공원","address":"제주특별자치도 서귀포시 법환동1534","region":"남부","category":"관광지","desc":"서귀포시에 위치한 두머니물공원은 범섬이 보이는 작은 규모의 공원이다. 법환마을과 강정마을의 경계선에 있는데 역사적 고증이 없어 확실하게는 알지 못하나 두면이(頭面怡) 물이라 해서 머리 두, 낯 면, 화할 이로 풀이하고 있다.","hours":"상시 개방","fee":"","lat":33.231,"lng":126.5073,"no":173},{"name":"법환동 청소년문화의집","address":"제주특별자치도 서귀포시 막숙포로 70-1","region":"남부","category":"문화시설","desc":"법환동 청소년문화의집은 2006년에 개관했으며 지역 청소년들의 건전한 여가생활을 위해 다양한 문화 교육 활동과 청소년 활동 지원 사업을 운영하고 있다. 2층 규모로 150여 명을 수용할 수 있다.","hours":"09:00~20:00※ 자세한 사항은 전화문의 요망","fee":"","lat":33.2355047172442,"lng":126.514186780656,"no":174},{"name":"속골유원지","address":"제주특별자치도 서귀포시 호근동1645","region":"남부","category":"관광지","desc":"속골유원지는 서귀포여고 옆 호근동 바닷가 근처에 있으며 이곳에 가면 울창한 숲과 함께 수량이 매우 풍부하고 바다까지 이어진 깊은 계곡을 만날 수 있다. 계곡 주변에는 숲속을 거닐 수 있는 탐방로가 있으며 탐방로 주변에는 사람들이 쉬어갈 수 있도록 벤치와 팔각정 등이 설치되어 있다.","hours":"상시 개방","fee":"","lat":33.2405340402,"lng":126.5262315324,"no":175},{"name":"제주과학탐구체험관","address":"제주특별자치도 제주시 산록북로 421-1 (오라이동)","region":"남부","category":"문화시설","desc":"제주과학 탐구체험관은 제주시 오라동 제주 미래 교육연구원에 위치하고 있다. 다양한 과학 체험을 할 수 있는 곳으로 1층 역동의 큐브는 물리, 역학적인 체험 전시물, 2층 발견의 큐브는 도입수학, 생명과학, 지구과학, 3층 도약의 큐브는 드론, 우주, 로봇, 스마트, 에너지, 시공간과 관련된 체험 전시물로 구성되어 있다.","hours":"10:00~17:00 (입장 마감 16:00)","fee":"","lat":33.4266496763,"lng":126.5314546657,"no":176},{"name":"숨도","address":"서귀포시 일주동로 8941(호근동)","region":"남부","category":"관광지","desc":"숨도는 제주의 화산활동을 통해 크고 작은 구멍이 뚫려 있는 화산석 그 위에 자연 생태가 조성되는 신비롭고 경의로운 생육환경에 매료되어 이러한 제주 자연의 이야기를 전달하고 그 가치를 나누고자 문을 연 정원이다. 숨구멍이 듬성한 현무암 위에 풍란과 야생화를 착근 시켜 하나의 예술품으로 만들어 낸 것이 석부작이다. 투박한 돌덩이를 초록의 뿌리가 굽이굽이 휘어 ","hours":"08:00~18:00","fee":"","lat":33.2502894592759,"lng":126.536006645318,"no":177},{"name":"삼매봉","address":"제주특별자치도 서귀포시 서홍동820-2","region":"남부","category":"관광지","desc":"서귀포시 시가지에서 서쪽에 해안네 있는 조그마한 기생화산으로 세 개의 봉우리가 매화를 닮았다고 하여 그 이름이 붙여졌으며 분화구는 북쪽에 있는 하논이다. 해안에는 절경을 지닌 외돌개가 있고, 오름 정상에는 조선 시대에 봉수대가 설치되어 있었다고 하며 오름 중턱까지 계단식으로 과수원이 조성되어 있다.","hours":"상시 개방","fee":"","lat":33.2439117723,"lng":126.5468824444,"no":178},{"name":"서귀포예술의전당","address":"제주특별자치도 서귀포시 태평로 270 (서홍동)","region":"남부","category":"문화시설","desc":"서귀포예술의전당은 지역 문화예술 진흥에 기여하고 시민의 문화예술향유 기회 확대와 공연활동의 지원을 위하여 2014년 6월 개관하여 운영되고 있다. 서귀포시 서홍동 삼매봉원공원 일대부지에 오름 분화구를 모티브로 움푹 파인 디자인과 한라산을 배경으로 제주바람 속에 피어난 문화와 예술의 오름이란 테마로 디자인되었다.","hours":"※ 공연마다 상이하므로 전화문의 요망","fee":"","lat":33.2463615646,"lng":126.5508014945,"no":179},{"name":"서귀포시립기당미술관","address":"제주특별자치도 서귀포시 남성중로153번길 15","region":"남부","category":"문화시설","desc":"기당미술관은 제주도가 고향인 재일 교포 사업가 기당 강구범 선생에 의해 건립되어 서귀포시에 기증되었으며 1987년 7월 1일 개관하였다. 기당미술관의 건축은 농촌의 눌(단으로 묶은 곡식을 차곡차곡 쌓아 놓은 더미를 가리키는 제주도 방언)을 형상화하여 나선형의 동선으로 이루어진 전시실이 특징이며, 한국의 전통 가옥을 연상시키는 서까래 천정과 적절한 자연광이 ","hours":"09:00~18:00","fee":"","lat":33.2447978549,"lng":126.5512403807,"no":180},{"name":"세계조가비박물관","address":"제주특별자치도 서귀포시 태평로 284","region":"남부","category":"문화시설","desc":"서양화 화가 명연숙 관장이 41여 년간 세계 각국에서 수집한 8,800여 종 개체 수 억 만점 이상의 신비하고 아름다운 오방색 조가비와 산호 그리고 동을 이용하여 세계 최초로 시도하는 새로운 형식의 세계조가비박물관이다. 바닷속 아름다운 조가비 세계를 예술 작가들이 연출하였는데, 부관장(권오균 금속조형작가)의 작품인 동을 소재로 하여 만든 받침대 위에 올려진","hours":"09:00~18:30 (매표 마감 17:30)※ 박물관 사정에 따라 변경될 수 있으므로 전화문의 요망","fee":"","lat":33.2474447916,"lng":126.5516736169,"no":181},{"name":"삼매봉도서관","address":"제주특별자치도 서귀포시 남성중로153번길 15 (서홍동)","region":"남부","category":"문화시설","desc":"삼매봉도서관은 제주특별자치도에 있는 15개의 공공도서관 중 한 곳으로 서귀포시 서홍동 기당미술관 옆에 있다. 다양한 자료를 수집 및 제공함으로써 도민의 독서 생활화에 기여하고 있으며, 다양한 계층별 독서 문화프로그램을 통해 도민들의 평생교육 실현에 앞장서고 있는 문화 소통의 복합 공간이다.","hours":"[종합자료실 / 아동열람실]- 주중 09:00~22:00 - 주말 09:00~18:00[정보이용실] - 주중 09:00~22:00 - 주말 09:00~18:00[열람실]- 08:00~23:00","fee":"","lat":33.2448561932,"lng":126.551973649,"no":182},{"name":"선임교","address":"제주특별자치도 서귀포시 중문로105번길 37","region":"남부","category":"관광지","desc":"선임교는 서귀포시 중문동에 있는 천제연 폭포와 중문관광단지를 이어 주는 아치형 철제다리이다. 선임교는 하늘에서 칠선녀가 내려온 다리라는 뜻으로 선녀다리, 구름다리, 칠선녀다리 등으로 부르기도 한다.","hours":"09:00~17:20※ 시기별 상이하므로 자세한 사항은 전화문의 요망","fee":"","lat":33.247055995,"lng":126.5547483594,"no":183},{"name":"천지연 걸매생태공원","address":"서귀포시 서홍로 4-42","region":"남부","category":"관광지","desc":"서귀포시 서홍동 천지연폭포 상류에 있는 걸매생태공원은 인간과 자연이 공존하는 생태도시의 표본이다. 국내 최대 관광의 보고인 천지연폭포를 보호하고 친환경적인 자연생태를 보존하여 시민과 관광객들에게 자연환경의 소중함을 일깨우는 생태관광 자원으로 가치가 높다. 수생식물 관찰원, 습지 생태계 관찰원, 매화 및 야생 초화류 관찰원, 야생 조류 관찰원, 목재 산책로 ","hours":"상시 개방","fee":"무료","lat":33.2499640127,"lng":126.5551177065,"no":184},{"name":"문섬/섶섬/범섬/새섬","address":"서귀포시 남성중로 43 (서홍동)","region":"남부","category":"관광지","desc":"서귀포 앞바다에는 새섬, 문섬, 범섬, 섶섬은 천연기념물로 지정된 아름다운 섬으로 서귀포해양도립공원에 속해있다. 이 중 문섬, 범섬, 섶섬은 유네스코 생물 보전권 지역으로 등록되었다. 서귀포항에서 이 섬들을 유람선과 잠수함으로 즐길 수 있다. 주변으로 천지연폭포를 비롯한 이중섭미술관, 서귀포 매일올레시장 등 다양한 체험을 할 수 있는 곳도 많다.","hours":"※ 자세한 사항은 전화문의 요망","fee":"무료","lat":33.23979255217772,"lng":126.55826631161924,"no":185},{"name":"서귀포 패류화석산지","address":"서귀포시 남성중로 43 (서홍동)","region":"남부","category":"관광지","desc":"서귀포층의 패류 화석은 서귀포시 남서 해안 절벽에 있는 조개 종류의 화석을 말한다. 이 절벽에는 퇴적암층이 드러나 있고 거친 면이 현무암으로 덮여 있다. 이 화석층에서는 조개 화석 위주의 동물 화석이 많이 발견된다. 약 180만 년 전부터 50만 년 전에 화석 생물과 함께 쌓여 이루어진 것으로 추정되며, 그 후 100m 정도 솟아오른 곳이 물결로 인해 깎여","hours":"상시 개방","fee":"무료","lat":33.2398207377,"lng":126.5582787717,"no":186},{"name":"새섬공원","address":"제주특별자치도 서귀포시 남성중로 43(서홍동)","region":"남부","category":"관광지","desc":"새섬 공원은 새섬 또는 모도(茅島)라고 불리는 서귀포시 서귀동에 있는 섬 공원이다. 억새인 새(茅)가 많아 붙은 이름이지만, 새(鳥)로 오해하여 조도(鳥島)로 오기하기도 한다.","hours":"상시 개방","fee":"","lat":33.2397485318,"lng":126.5588092829,"no":187},{"name":"새연교","address":"제주특별자치도 서귀포시 서홍동","region":"남부","category":"관광지","desc":"제주 서귀포항과 새섬사이에 제주의 전통 떼배인 테우를 모티브로 형상화한 대한민국 최남단 최장의 보도교인 새연교가 2009년 9월 28일 개통됐다. 새연교는 국내에서는 최초로 외줄케이블 형식의 사장교로, 바람과 돛을 형상화한 주탑 등에 화려한 LED 조명시설까지 갖췄다.","hours":"상시 개방※ 점등시간이 있으므로 자세한 사항은 전화문의 요망","fee":"","lat":33.2378293118,"lng":126.559612034,"no":188},{"name":"황우지해안열두굴","address":"서귀포시 서홍동764-1","region":"남부","category":"관광지","desc":"제주도 내에는 일제 강점기 말에 이르러 일본군이 만든 군사 시설을 심심치 않게 찾아볼 수 있다. 삼매봉 남서쪽 해안가에는 ‘황우지굴’, ‘열두굴’ 등으로 불리는 황우지 해안 열두굴은 제2차 세계대전 당시 일본군이 미군의 공격을 대비해 어뢰정을 숨기기 위해 인공적으로 만들어 놓은 동굴이다. 각각 15m 안팎의 거리를 두고 직선으로 나란히 뚫려 있으며, 높이가","hours":"상시 개방","fee":"무료","lat":33.2420288662,"lng":126.5607118442,"no":189},{"name":"이중섭거리","address":"제주특별자치도 서귀포시 이중섭로 29 (서귀동)","region":"남부","category":"관광지","desc":"40세의 젊은 나이에 요절한 천재 화가 이중섭을 기리기 위해 피난 당시 거주했던 초가를 중심으로 조성된 거리이다. 1996년에 사업체가 창단하고 1997년 9월 복원되었다.","hours":"상시 개방","fee":"","lat":33.2455202067,"lng":126.5644697732,"no":190},{"name":"이중섭 미술관","address":"제주특별자치도 서귀포시 이중섭로 33 (서귀동)","region":"남부","category":"문화시설","desc":"이중섭 미술관은 천재 화가 이중섭의 창작 열의와 불멸의 예술성을 후대에 기리고자 건립된 전시관이다. 2002년 이중섭 전시관으로 개관하여 2004년 제1종 미술관으로 등록되었다.","hours":"09:30~17:30","fee":"","lat":33.245159269694526,"lng":126.56447048522864,"no":191},{"name":"자구리문화예술공원(자구리공원)","address":"제주특별자치도 서귀포시 칠십리로 120-12 (서귀동)","region":"남부","category":"관광지","desc":"제주도의 아름다운 바다 풍광과 함께 작가들의 숨결이 느껴지는 작품을 감상하며 걷는 제주 산책길 코스 중 하나다. 제주도의 민물과 바닷물이 만나는 곳으로 전망대가 있어 정면에는 섶 섬, 오른쪽으로는 서귀포항과 문섬을 볼 수 있다.","hours":"상시 개방","fee":"","lat":33.241942872,"lng":126.5675084795,"no":192},{"name":"서귀포문화원","address":"제주특별자치도 서귀포시 동홍로 30 (동홍동)서귀포 시민문화체육복합센터 1F","region":"남부","category":"문화시설","desc":"서귀포문화원은 1996년에 창립하여, 12년 만인 2008년 7월 행정시 통합으로 인한 남제주문화원과 통합문화원으로 새로운 출발을 시작하였다. 서귀포문화원은 성산 일출봉에서 대정 송악산까지 가파, 마라도를 아우르는 역사 유적의 연구 조사 활동, 조상의 숨결이 밴 유형무형의 문화재를 발굴 보존 전승하는 일을 하고 있다.","hours":"09:00~18:00 (휴게시간 12:00~13:00)","fee":"","lat":33.2509974498,"lng":126.5688303839,"no":193},{"name":"서복전시관","address":"제주특별자치도 서귀포시 칠십리로 156-8(서귀동)","region":"남부","category":"문화시설","desc":"서복전시관은 중국 진나라 때 진시황의 불로장생의 꿈을 이루기 위해 불로초를 찾아 제주도로 왔다고 전해지는 서복을 기념하여 만든 전시관이다. 1999년 2월 27일 문화관광부 전국 7대 문화관광권 개발 사업으로 지정되어 2003년 9월 26일 개관했다.","hours":"09:00~18:00 (입장 마감 17:30)","fee":"","lat":33.2449259259,"lng":126.5706414743,"no":194},{"name":"왈종미술관","address":"제주특별자치도 서귀포시 칠십리로214번길 30(동홍동)","region":"남부","category":"문화시설","desc":"왈종미술관은 제주도 서귀포시 정방폭포 입구에 자리한 사립 미술관이다. 이곳은 평생 동안 제주의 풍요로움과 아름다움을 화폭에 담아 온 이왈종 화백이 자신의 이름을 걸고 개관한 곳이다.","hours":"- 미술관 10:00~18:00 (입장 마감 17:30)- 아트샵 10:00~18:00","fee":"","lat":33.2453287076,"lng":126.5736773135,"no":195},{"name":"소라의성","address":"제주특별자치도 서귀포시 칠십리로214번길 17-17 (동홍동)","region":"남부","category":"관광지","desc":"소라의성은 서귀포시 동홍동에 있는 건축물로 단순하면서도 곡선의 아름다움이 살아있다. 소정방폭포 인근의 해안 절벽에 지어져 있어 절경을 감상할 수 있는 곳이다.","hours":"[1층]- 상시 개방[2층]- 09:00~18:00- 준비시간 12:00~13:00","fee":"","lat":33.24517918333078,"lng":126.576955321183,"no":196},{"name":"소정방폭포","address":"서귀포시 칠십리로214번길 17-17 (동홍동)","region":"남부","category":"관광지","desc":"소정방폭포는 제주도 서귀포시 제주올레 6코스에 있는 폭포이다. 소정방이라는 말은 정방폭포 옆의 작은 폭포라는 의미로 정방 폭포의 동쪽 570m 지점에 있다. 대한민국 폭포 중 정방폭포와 같은 해안 폭포로 육지에서 곧바로 바다로 연결되어 낙수가 떨어진다. 폭포의 높이가 낮고 물이 워낙 차가워 주변 주민들의 물맞이 장소로 인기가 있다. 제주에는 백중날(음력 7","hours":"상시 개방","fee":"무료","lat":33.2452065509,"lng":126.5769659202,"no":197},{"name":"돈내코 원앙폭포","address":"서귀포시 돈내코로 137","region":"남부","category":"관광지","desc":"돈내코는 제주특별자치도 서귀포시에 위치한 계곡으로 에메랄드빛 강물과 난대 상록수림이 울창한 모습을 볼 수 있고 높이 5m의 원앙폭포와 작은 못이 있어 그 경치가 매우 수려하다. 돈내코 입구에서 산책로를 따라 20분 정도 걸어 들어가면 만날 수 있는 원앙폭포는 두 개의 물줄기가 떨어지는데, 금슬 좋은 원앙 한 쌍이 살았다 하여 원앙폭포라는 이름이 붙여졌다. ","hours":"상시 개방","fee":"무료","lat":33.3005255267,"lng":126.5820170154,"no":198},{"name":"보목마을","address":"제주특별자치도 서귀포시 보목포로 46 (보목동)","region":"남부","category":"관광지","desc":"보목마을은 제주도 올레길 6코스의 쇠소깍과 외돌개의 사이에 위치한 작은 어촌 마을이다. 보목마을의 옛 이름은 ‘볼레낭개’로 ‘볼레낭(보리수 나무)이 우거진 갯마을’이라고 해서 붙여진 이름이다.","hours":"상시 개방","fee":"","lat":33.239218025387814,"lng":126.60676156856265,"no":199},{"name":"감귤박물관","address":"제주특별자치도 서귀포시 효돈순환로 441","region":"남부","category":"문화시설","desc":"서귀포 감귤 박물관은 제주 특산물인 감귤을 테마로 감귤의 세계를 한눈에 보고, 느끼고, 체험할 수 있도록 개관한 공립 전문 박물관이다. 감귤의 역사와 문화, 산업과 노동 현장을 엿볼 수 있는 의미 있는 전시 등을 통해 제주인의 삶의 모습을 반추해 볼 수 있다.","hours":"09:00~18:00 (입장 마감 17:30)","fee":"","lat":33.2711520767709,"lng":126.608077266292,"no":200},{"name":"5.16 도로숲터널","address":"제주특별자치도 서귀포시 남원읍 신례천로 267-110","region":"남부","category":"관광지","desc":"5. 16 도로숲터널은 제주에서 최초로 개통된 국도로 제주시와 서귀포를 이어주는 길이다.","hours":"상시개방","fee":"","lat":33.3140386947,"lng":126.6304291801,"no":201},{"name":"휴애리자연생활공원","address":"제주특별자치도 서귀포시 남원읍 신례동로 256","region":"남부","category":"관광지","desc":"휴애리는 수많은 꽃들과 한라산 풍경이 더해져 더욱 아름다움을 자랑하는 꽃 정원이다. 연중무휴이며, 매년 수차례 꽃 축제를 진행하고 있다.","hours":"[하절기(3월~9월)]09:00~19:00 (입장 마감 17:30)[동절기(10월~2월)]09:00~18:00 (입장 마감 16:30)","fee":"","lat":33.3085171454,"lng":126.6344317363,"no":202},{"name":"돌낭예술원","address":"서귀포시 남원읍 서성로 544-35","region":"남부","category":"관광지","desc":"돌낭예술원은 14년 간 황무지땅을 일구어 가꿔 2024년 봄에 열었다. 아버지의 예술혼을 불어넣은 분재와 석부작을 주요 테마로 하여 다양한 제주자생식물과 화산석을 만날 수 있는 생태예술정원이다. 1만 4천 평 부지에 120여 종의 수목, 200종의 야생화와 수십 종류의 수국으로 숲을 이루고 곳곳에 샤스타데이지, 수레국화, 백일홍, 코스모스 등 계절별로 다양","hours":"09:00~18:00 (입장 마감 17:00)","fee":"- 성인 10,000원- 청소년 8,000원- 어린이 7,000원- 경로,군인,임산부 8,000원- 장애인,","lat":33.31977178437227,"lng":126.65460327821138,"no":203},{"name":"위미항","address":"서귀포시 남원읍 위미중앙로196번길 6-13","region":"남부","category":"관광지","desc":"위미항은 국가 어항으로 풍부한 수산자원을 보유한 연근해 어업의 근거지다. 제주에서 가장 포근하고 따뜻한 곳으로 봄에는 제주도에서 가장 먼저 벚꽃이 개화하는 곳이며 석양이 아름답기로도 유명하다. 위미항은 바닥이 훤히 보일 정도로 맑고 깨끗한 것이 특징이다. 바다 멀리 편평하게 다듬어 놓은 듯한 지귀도가 보인다. 제주 올레 5코스에 속해 있는 이곳은 걷기에도 ","hours":"상시 개방","fee":"무료","lat":33.2713050304,"lng":126.662391266,"no":204},{"name":"제주 센트럴파크","address":"제주특별자치도 제주시 조천읍 비자림로 606","region":"남부","category":"관광지","desc":"제주 센트럴파크는 태고의 신비를 그대로 간직한 한라산을 중심으로 둘러싼 중산간에 위치하여 있다. 1만 5천 평 규모의 사계절 형형색색의 아름다운 경관 속에 에펠탑, 자유의 여신상, 콜로세움 등 전 세계의 유명 건축 조형물 미니어처와 캐릭터 조형물, 그리고 세계 위인상과 인물상이 전시되어 있다.","hours":"09:00~18:00 (입장 마감 17:00)","fee":"","lat":33.4332262333,"lng":126.6745670935,"no":205},{"name":"위미동백나무군락","address":"서귀포시 남원읍 위미중앙로300번길 15","region":"남부","category":"관광지","desc":"위미동백나무군락은 황무지를 옥토로 가꾸기 위하여 정성을 쏟은 현맹춘 할머니의 얼이 깃든 곳이다. 17세 되던 해 이 마을로 시집온 현맹춘(1858-1933) 할머니는 해초 캐기와 품팔이 등 근면하고 검소한 생활로 어렵게 모은 돈으로 이곳 황무지를 사들였다. 그리고 모진 바람을 막기 위하여 한라산의 동백 씨앗을 따다가 뿌린 것이 오늘날에 이르러 숲을 이루었다","hours":"상시 개방","fee":"무료","lat":33.27287477995361,"lng":126.67499910688764,"no":206},{"name":"제주동백수목원","address":"서귀포시 남원읍 태위로 288","region":"남부","category":"관광지","desc":"제주동백수목원은 위미리 동백군락지를 일군 할머니의 증손자가 1977년부터 꺾꽂이로 정성스럽게 가꾼 둥근 수형의 애기동백나무 수백여 그루가 숲을 이루고 있는 수목원이다. 큰 애기동백나무 수백그루가 어우러져 있는 것을 볼 수 있고 수백 종류의 동백나무와 야생화, 야자수, 전망대, 연못, 방사탑, 조각상 등 다양한 볼거리가 있다. 분수대와 산책로도 있어 겨울마다","hours":"09:00~18:00 (입장 마감 17:00)※ 11월 중순부터 2월 말 운영으로 자세한 사항은 전화문의 요","fee":"- 성인 8,000원- 어린이 5,000원","lat":33.2753,"lng":126.678,"no":207},{"name":"호빗집","address":"제주특별자치도 서귀포시 남원읍 한남리1429","region":"남부","category":"관광지","desc":"제주도의 숨은 포토존으로 알려진 이곳은 돌을 쌓아 만든 감자 보관 창고이며, 반지의 제왕에 나온 호빗이 살던 집과 비슷하다 하여 호빗집 또는 요정의 집 등으로 불리고 있다. 직접 보면 이름에서 예상되듯이 작은 규모이기 때문에 사진을 찍으면 독특한 분위기로 예쁘게 담기기 때문에 많은 사람들이 꾸준히 스냅 촬영지로 이곳을 찾는다.","hours":"상시 개방","fee":"","lat":33.3126591307,"lng":126.6830718721,"no":208},{"name":"헌마공신김만일기념관","address":"제주특별자치도 서귀포시 서성로 919","region":"남부","category":"문화시설","desc":"헌마공신김만일기념관은 옷귀마테마타운 근처에 있다. 조선시대에 83년 동안 수천 마리의 말을 나라에 바친 공으로 임금으로부터 헌마공신이라는 명예와 벼슬을 받은 김만일을 기념하는 곳이다.","hours":"09:00~18:00 (입장 마감 17:40)","fee":"","lat":33.3361761033,"lng":126.6907984475,"no":209},{"name":"최남단체험감귤농장","address":"제주특별자치도 서귀포시 남원읍 남위남성로 164","region":"남부","category":"관광지","desc":"서귀포시 최남단 남원읍에 위치한 최남단감귤체험농장 가뫼물은 감귤농장을 다시 일으켜 보겠다는 결심하에 개장한 감귤 농장으로, 가뫼물은 항상 물이 흐르고 마르지 않는 샘이라는 뜻을 담고 있다. 가뫼물은 사계절 내내 감귤 체험을 즐길 수 있는 곳으로 감귤과 관련된 다양한 상품을 판매하기도 한다.","hours":"09:00~18:00 (입장 마감 17:00)","fee":"","lat":33.2899451411,"lng":126.6937659047,"no":210},{"name":"제동목장 입구","address":"제주특별자치도 제주시 조천읍 교래7길 218","region":"남부","category":"관광지","desc":"제동목장은 한진그룹에서 운영하는 제주도 목장으로 한국마사회에서 운영하는 렛츠런팜 목장 인근에 자리 잡고 있다. 제동목장은 사유지이기 때문에 목장 출입은 불가능 하나, 최근 제동목장 진입도로가 제주도 결혼사진 촬영 명소로 널 ":33.3060421741,"lng":126.7929069544,"no":239},{"name":"금호리조트 제주","address":"제주특별자치도 서귀포시 남원읍 태위로 522-12","region":"동부","category":"관광지","desc":"금호리조트 제주는 남원관광단지에 위치해 있으며 초원과 해안절벽을 끼고 세워졌다. 서귀포에서 동측 방향으로 15km, 표선으로부터 서남방향으로 5km 지점에 위치하고지점에 있어 서귀포 중문 관광단지와 제주민속촌, 성산일출봉 등 풍부한 주변관광지를 가지고 있다.","hours":"","fee":"","lat":33.2740331563,"lng":126.703084902,"no":240},{"name":"금호리조트 제주아쿠아나","address":"제주특별자치도 서귀포시 남원읍 태위로 522-12","region":"동부","category":"관광지","desc":"금호리조트 제주 아쿠아나는 남원관광지 인근에 위치한 금호리조트제주 내 물놀이 시설이다. 초원과 제주바다의 아름다운 해안절벽을 낀 수영장에서 바라보는 탁 트인 오션뷰가 제주아쿠아나의 자랑거리이다.","hours":"[사우나] 06:00~21:00[아쿠아나]- 실내 10:00~18:00- 야외 12:00~17:00","fee":"","lat":33.2737526275,"lng":126.7028238197,"no":241}];

let activeRegion='전체', activeCat='전체', searchQ='';

function filtered(){
  return PLACES.filter(p=>{
    if(activeRegion!=='전체'&&p.region!==activeRegion) return false;
    if(activeCat!=='전체'&&p.category!==activeCat) return false;
    if(searchQ&&!p.name.includes(searchQ)&&!p.desc.includes(searchQ)&&!p.address.includes(searchQ)) return false;
    return true;
  });
}

function regionColor(r){return REGION_COLORS[r]||'#00695C';}

function cardHtml(p){
  const c=regionColor(p.region);
  const catClass=p.category==='관광지'?'cat-spot':'cat-culture';
  const catEn=p.category==='관광지'?'Sightseeing':'Culture';
  const hoursHtml=p.hours?`<div class="card-meta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>${p.hours}</span></div>`:'';
  const feeHtml=p.fee?`<div class="card-meta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>${p.fee}</span></div>`:'';
  return `<div class="card" onclick="openModal(${p.no})">
    <div class="card-accent" style="background:${c}"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-num" style="background:${c}">${p.no}</div>
        <div><div class="card-name">${p.name}</div><span class="card-cat ${catClass}">${p.category} · ${catEn}</span></div>
      </div>
      <p class="card-desc">${p.desc||'상세 정보를 확인하세요.'}</p>
      <div class="card-footer">
        <div class="card-meta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${p.address}</span></div>
        ${hoursHtml}${feeHtml}
      </div>
    </div>
  </div>`;
}

function render(){
  const pts=filtered();
  const main=document.getElementById('main-content');
  const empty=document.getElementById('empty-state');
  document.getElementById('count-badge').textContent=pts.length+'곳';
  if(pts.length===0){main.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  if(activeRegion!=='전체'||searchQ){
    main.innerHTML=`<div class="card-grid">${pts.map(cardHtml).join('')}</div>`;
  } else {
    let html='';
    for(const reg of REGION_ORDER){
      const regPts=pts.filter(p=>p.region===reg);
      if(!regPts.length) continue;
      const c=regionColor(reg);
      html+=`<section class="region-section" data-region="${reg}">
        <div class="region-header">
          <div class="region-dot" style="background:${c}"></div>
          <div><div class="region-title-ko">${reg}</div><div class="region-title-en">${REGION_EN[reg]}</div></div>
          <div class="region-cnt">${regPts.length}곳</div>
        </div>
        <div class="card-grid">${regPts.map(cardHtml).join('')}</div>
      </section>`;
    }
    main.innerHTML=html;
  }
}

function openModal(no){
  const p=PLACES.find(x=>x.no===no);
  if(!p) return;
  const c=regionColor(p.region);
  document.getElementById('m-num').style.background=c;
  document.getElementById('m-num').textContent=p.no;
  document.getElementById('m-name').textContent=p.name;
  document.getElementById('m-tags').innerHTML=`
    <span class="modal-tag" style="background:${c}20;color:${c}">${p.region}</span>
    <span class="modal-tag ${p.category==='관광지'?'cat-spot':'cat-culture'}">${p.category}</span>`;
  document.getElementById('m-desc').textContent=p.desc||'상세 정보를 확인하세요.';
  let info=`<div class="modal-info-row"><span class="info-label">주소</span><span class="info-val">${p.address}</span></div>`;
  if(p.hours) info+=`<div class="modal-info-row"><span class="info-label">운영시간</span><span class="info-val">${p.hours}</span></div>`;
  if(p.fee) info+=`<div class="modal-info-row"><span class="info-label">입장료</span><span class="info-val">${p.fee}</span></div>`;
  document.getElementById('m-info').innerHTML=info;
  const mapUrl=`https://map.naver.com/v5/search/${encodeURIComponent(p.name+' '+p.address)}`;
  document.getElementById('m-map').href=mapUrl;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('overlay')) closeModalBtn();}
function closeModalBtn(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}

document.querySelectorAll('.filter-btn[data-region]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn[data-region]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeRegion=btn.dataset.region;
    render();
  });
});
document.querySelectorAll('.filter-btn[data-cat]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.classList.contains('active')){btn.classList.remove('active');activeCat='전체';}
    else{document.querySelectorAll('.filter-btn[data-cat]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');activeCat=btn.dataset.cat;}
    render();
  });
});
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.trim();render();});

render();
</script>
</body>
</html>
