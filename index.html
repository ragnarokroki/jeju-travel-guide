<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주도 여행 가이드 | Jeju Travel Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{--jeju:#00695C;--jeju-city:#1565C0;--west:#2E7D32;--south:#BF360C;--east:#6A1B9A;--sand:#FAF8F3;--ink:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--card-bg:#FFFFFF;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;}
.hero{background:linear-gradient(160deg,#004D40 0%,#00695C 45%,#00897B 100%);padding:64px 24px 80px;text-align:center;position:relative;overflow:hidden;}
.hero-badge{display:inline-block;background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.9);font-size:12px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);margin-bottom:20px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,6vw,3.8rem);color:#fff;line-height:1.15;margin-bottom:10px;}
.hero h1 em{font-style:normal;color:#A7FFEB;font-weight:700;}
.hero-sub{color:rgba(255,255,255,0.75);font-size:15px;font-weight:300;margin-bottom:36px;}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;color:#A7FFEB;font-weight:700;line-height:1;}
.stat-label{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

.toolbar{position:sticky;top:0;z-index:100;background:rgba(250,248,243,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.search-wrap{position:relative;min-width:120px;max-width:160px;flex:0 1 160px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);}
#search{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:8px;font-size:14px;outline:none;}

.filter-btn{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:all .2s;color:var(--muted);}
.filter-btn.active{color:#fff;}
.filter-btn[data-region="전체"].active{background:var(--jeju);border-color:var(--jeju);}
/* ... 기타 스타일 생략 (기존 index.html과 동일) ... */

.main{max-width:1280px;margin:0 auto;padding:32px 24px 80px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.card{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--border);padding:16px;cursor:pointer;transition:transform .22s;}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.09);}
</style>
</head>
<body>
<div class="hero">
  <div class="hero-badge">Jeju Island Travel Guide</div>
  <h1>제주도 <em>완전정복</em></h1>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num">556</div><div class="stat-label">총 장소</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="장소명 검색...">
  </div>
  <div class="filter-scroll">
    <button class="filter-btn active" data-region="전체">전체</button>
    <button class="filter-btn" data-region="제주시">제주시</button>
    <button class="filter-btn" data-region="서부">서부</button>
    <button class="filter-btn" data-region="남부">남부</button>
    <button class="filter-btn" data-region="동부">동부</button>
  </div>
  <span class="count-badge" id="count-badge">556곳</span>
</div>

<div class="main" id="main-content"></div>

<script>
// 데이터부: 외부 파일 없이 직접 포함
const PLACES = [
  {"name":"한수풀 해녀학교","address":"제주시 한림읍 한림해안로 623-6","region":"제주시","category":"관광지","desc":"해녀문화를 젊은 세대에 전수하기 위한 학교...","hours":"전화문의","fee":"","lat":33.4430,"lng":126.2791,"no":1},
  {"name":"곽지해수욕장","address":"제주시 애월읍 곽지리 1565","region":"제주시","category":"관광지","desc":"과물노천탕이 유명한 해변...","hours":"상시","fee":"무료","lat":33.4485,"lng":126.3031,"no":2},
  // ... (여기에 556개의 데이터가 순차적으로 들어갑니다)
  {"name":"당케포구","address":"서귀포시 표선면 민속해안로 566-1","region":"동부","category":"관광지","desc":"표선 해비치 해변에 있는 포구...","hours":"상시","fee":"무료","lat":33.0000,"lng":126.0000,"no":556}
];

const main = document.getElementById('main-content');
const searchInput = document.getElementById('search');
let currentRegion = '전체';

function render() {
  const query = searchInput.value.toLowerCase();
  const filtered = PLACES.filter(p => 
    (currentRegion === '전체' || p.region === currentRegion) &&
    (p.name.toLowerCase().includes(query) || p.address.toLowerCase().includes(query))
  );

  main.innerHTML = `<div class="card-grid">${filtered.map(p => `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.address}</p>
      <small>${p.category} | ${p.region}</small>
    </div>
  `).join('')}</div>`;
  document.getElementById('count-badge').textContent = `${filtered.length}곳`;
}

searchInput.addEventListener('input', render);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.filter-btn.active').classList.remove('active');
    btn.classList.add('active');
    currentRegion = btn.dataset.region;
    render();
  });
});

render(); // 초기 렌더링
</script>
</body>
</html>
