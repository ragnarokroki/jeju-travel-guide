<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주도 여행 가이드 | Jeju Travel Guide</title>

<meta name="description" content="제주도 556곳의 관광지와 문화시설을 한눈에 확인하는 완전정복 가이드입니다.">
<meta property="og:type" content="website">
<meta property="og:title" content="제주도 여행 완전정복 가이드">
<meta property="og:description" content="섬 구석구석 숨겨진 보석 같은 556개의 장소를 확인하세요.">
<meta property="og:image" content="https://ragnarokroki.github.io/jeju-travel-guide/og-image.jpg">
<meta property="og:url" content="https://ragnarokroki.github.io/jeju-travel-guide/index.html">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">

<style>
:root{--jeju:#00695C;--jeju-city:#1565C0;--west:#2E7D32;--south:#BF360C;--east:#6A1B9A;--sand:#FAF8F3;--ink:#1A1A1A;--muted:#6B7280;--border:#E5E7EB;--card-bg:#FFFFFF;--radius:14px;}

/* 다크 모드 지원 */
@media (prefers-color-scheme: dark) {
  :root { --sand:#121212; --ink:#F3F4F6; --muted:#9CA3AF; --border:#374151; --card-bg:#1F2937; }
  body { background: #121212; }
  .toolbar { background: rgba(18, 18, 18, 0.97) !important; border-bottom-color: #374151 !important; }
  #search { background: #2D3748; color: white; border-color: #4A5568; }
  .filter-btn { background: #2D3748; color: #CBD5E0; border-color: #4A5568; }
  .hero-badge { color: white !important; }
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--ink);min-height:100vh;transition: background 0.3s;}

/* Hero Section */
.hero{background:linear-gradient(160deg,#004D40 0%,#00695C 45%,#00897B 100%);padding:64px 24px 80px;text-align:center;color:white;}
.hero-badge{
  display:inline-block;padding:6px 14px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);
  border-radius:30px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:0.2s;margin-bottom:16px;color:white;text-decoration:none;
}
.hero-badge:hover{background:rgba(255,255,255,0.25);transform:translateY(-2px);}
h1{font-family:'Playfair Display',serif;font-size:42px;margin-bottom:12px;}
h1 em{font-family:'Noto Serif KR',serif;font-style:italic;}
.hero p{font-size:16px;opacity:0.9;max-width:500px;margin:0 auto 32px;}

/* Stats */
.hero-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap;}
.stat-num{font-size:24px;font-weight:600;font-family:'Playfair Display',serif;}
.stat-label{font-size:12px;opacity:0.7;text-transform:uppercase;margin-top:4px;}

/* Toolbar */
.toolbar{
  position:sticky;top:0;z-index:100;background:rgba(250, 248, 243, 0.97);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:12px;align-items:center;
  justify-content:center;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
}
.toolbar::-webkit-scrollbar {display:none;}
.search-wrap{position:relative;flex-shrink:0;width:240px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;color:var(--muted);}
#search{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--border);border-radius:10px;outline:none;}
.divider{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.filter-scroll{display:flex;gap:8px;flex-shrink:0;}
.filter-btn{padding:8px 14px;border:1px solid var(--border);background:white;border-radius:10px;font-size:13px;cursor:pointer;white-space:nowrap;transition:0.2s;}
.filter-btn.active{background:var(--ink);color:white;border-color:var(--ink);}
.count-badge{font-size:13px;font-weight:600;color:var(--jeju);flex-shrink:0;}

/* Grid & Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;padding:32px 24px;max-width:1400px;margin:0 auto;}
.card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);transition:0.3s;cursor:pointer;position:relative;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-8px);box-shadow:0 12px 24px rgba(0,0,0,0.08);}
.card-img{width:100%;height:200px;object-fit:cover;background:#eee;}
.card-content{padding:20px;flex-grow:1;}
.card-name{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;margin-bottom:6px;}
.card-addr{font-size:13px;color:var(--muted);line-height:1.4;}

/* Favorite Button */
.fav-btn{position:absolute;top:12px;right:12px;background:rgba(0,0,0,0.3);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center;transition:0.2s;}
.fav-btn.active{color:#ff4757;background:white;}

/* Highlight & Skeleton */
.highlight{background:#fde047;color:black;padding:0 2px;border-radius:2px;font-weight:bold;}
.skeleton{background: linear-gradient(90deg, var(--border) 25%, var(--sand) 50%, var(--border) 75%); background-size: 200% 100%; animation: skeleton-load 1.5s infinite;}
@keyframes skeleton-load {0%{background-position:200% 0;} 100%{background-position:-200% 0;}}

/* Modal */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--card-bg);width:100%;max-width:500px;border-radius:20px;overflow:hidden;position:relative;animation:modalUp 0.3s ease-out;}
@keyframes modalUp {from{transform:translateY(20px);opacity:0;} to{transform:translateY(0);opacity:1;}}
.modal-body{padding:32px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;}
.modal-btn{flex:1;padding:14px;text-align:center;border-radius:10px;text-decoration:none;font-weight:600;cursor:pointer;border:none;font-size:14px;}
.btn-primary{background:var(--ink);color:var(--sand);}
.btn-secondary{background:var(--border);color:var(--ink);}

#loading-ui{text-align:center;padding:40px;font-weight:600;color:var(--muted);grid-column:1/-1;}
</style>
</head>
<body>

<div class="hero">
  <a href="https://ragnarokroki.github.io/jeju-travel-guide/index.html" class="hero-badge">Jeju Island Travel Guide</a>
  <h1>제주도 <em>완전정복</em></h1>
  <p>섬의 구석구석, 숨겨진 556개의 보물을 찾아보세요.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num">556</div><div class="stat-label">총 장소</div></div>
    <div class="stat"><div class="stat-num">4</div><div class="stat-label">지역</div></div>
    <div class="stat"><div class="stat-num">466</div><div class="stat-label">관광지</div></div>
    <div class="stat"><div class="stat-num">90</div><div class="stat-label">문화시설</div></div>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="장소명 검색...">
  </div>
  <div class="divider"></div>
  <div class="filter-scroll">
    <button class="filter-btn active" data-region="전체">전체</button>
    <button class="filter-btn" data-region="제주시">제주시</button>
    <button class="filter-btn" data-region="서귀포시">서귀포시</button>
    <button class="filter-btn" data-region="동부">동부</button>
    <button class="filter-btn" data-region="서부">서부</button>
    <div class="divider"></div>
    <button class="filter-btn" data-cat="관광지">관광지</button>
    <button class="filter-btn" data-cat="문화시설">문화시설</button>
    <div class="divider"></div>
    <button class="filter-btn" data-free="1">🎫 무료입장</button>
    <button class="filter-btn" id="fav-filter">❤️ 찜한곳</button>
  </div>
  <span class="count-badge" id="count-badge">556곳</span>
</div>

<div class="grid" id="grid"></div>
<div id="loading-ui" style="display:none;">장소를 더 불러오는 중...</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <img id="m-img" class="card-img" style="height:250px;">
    <div class="modal-body">
      <h2 id="m-name" class="card-name" style="font-size:24px;"></h2>
      <p id="m-addr" class="card-addr" style="font-size:15px; margin-top:8px; -webkit-line-clamp:unset;"></p>
      <div class="modal-actions">
        <button onclick="copyAddress()" class="modal-btn btn-secondary">주소 복사</button>
        <a id="m-map" href="#" target="_blank" class="modal-btn btn-primary">네이버 지도</a>
      </div>
    </div>
  </div>
</div>

<script>
let data = [];
let favorites = JSON.parse(localStorage.getItem('jeju-favorites')) || [];
let curPage = 1;
const perPage = 20;
let aR = '전체', aC = '전체', aSearch = '', aFree = false, aFavOnly = false;
let isLoading = false;

async function init() {
  showSkeleton();
  try {
    const res = await fetch('data.json');
    data = await res.json();
    render(true);
  } catch(e) {
    document.getElementById('grid').innerHTML = '<p id="loading-ui">데이터를 불러오지 못했습니다.</p>';
  }
}

function showSkeleton() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(8).fill(0).map(() => `<div class="card skeleton" style="height:320px;"></div>`).join('');
}

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query})`, 'gi');
  return text.replace(re, '<span class="highlight">$1</span>');
}

function render(reset = false) {
  if (reset) { curPage = 1; window.scrollTo(0,0); }
  
  const filtered = data.filter(p => {
    const matchR = aR === '전체' || p.region === aR;
    const matchC = aC === '전체' || p.category === aC;
    const matchS = p.name.includes(aSearch) || p.address.includes(aSearch);
    const matchF = !aFree || p.is_free === 1;
    const matchFav = !aFavOnly || favorites.includes(p.id);
    return matchR && matchC && matchS && matchF && matchFav;
  });

  document.getElementById('count-badge').innerText = `${filtered.length}곳`;

  const slice = filtered.slice(0, curPage * perPage);
  const grid = document.getElementById('grid');

  if (slice.length === 0) {
    grid.innerHTML = '<p id="loading-ui">결과가 없습니다.</p>';
    return;
  }

  grid.innerHTML = slice.map(p => {
    const isFav = favorites.includes(p.id);
    return `
      <div class="card" onclick="openModal(${p.id})">
        <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav(event, ${p.id})">
          ${isFav ? '❤️' : '🤍'}
        </button>
        <img class="card-img" src="${p.image}" loading="lazy" alt="${p.name}">
        <div class="card-content">
          <div class="card-name">${highlight(p.name, aSearch)}</div>
          <div class="card-addr">${highlight(p.address, aSearch)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleFav(e, id) {
  e.stopPropagation();
  const idx = favorites.indexOf(id);
  if (idx > -1) favorites.splice(idx, 1);
  else favorites.push(id);
  localStorage.setItem('jeju-favorites', JSON.stringify(favorites));
  render();
}

function openModal(id) {
  const p = data.find(i => i.id === id);
  if(!p) return;
  document.getElementById('m-img').src = p.image;
  document.getElementById('m-name').innerText = p.name;
  document.getElementById('m-addr').innerText = p.address;
  document.getElementById('m-map').href = `https://map.naver.com/v5/search/${encodeURIComponent(p.name + ' ' + p.address)}`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target.id === 'overlay') {
    document.getElementById('overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
}

function copyAddress() {
  const addr = document.getElementById('m-addr').innerText;
  navigator.clipboard.writeText(addr).then(() => alert('주소가 복사되었습니다!'));
}

// Infinite Scroll
window.addEventListener('scroll', () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 600) {
    const filtered = data.filter(p => {
      const matchR = aR === '전체' || p.region === aR;
      const matchC = aC === '전체' || p.category === aC;
      const matchS = p.name.includes(aSearch) || p.address.includes(aSearch);
      const matchF = !aFree || p.is_free === 1;
      const matchFav = !aFavOnly || favorites.includes(p.id);
      return matchR && matchC && matchS && matchF && matchFav;
    });
    if (curPage * perPage < filtered.length) { curPage++; render(); }
  }
});

// Event Listeners
document.querySelectorAll('.filter-btn[data-region]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-region]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); aR = btn.dataset.region; render(true);
  });
});

document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    if(btn.classList.contains('active')){btn.classList.remove('active');aC='전체';}
    else{document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));btn.classList.add('active');aC=btn.dataset.cat;}
    render(true);
  });
});

document.querySelector('.filter-btn[data-free]').addEventListener('click', function() {
  aFree = !aFree; this.classList.toggle('active', aFree); render(true);
});

document.getElementById('fav-filter').addEventListener('click', function() {
  aFavOnly = !aFavOnly; this.classList.toggle('active', aFavOnly); render(true);
});

let timer;
document.getElementById('search').addEventListener('input', (e) => {
  clearTimeout(timer);
  timer = setTimeout(() => { aSearch = e.target.value; render(true); }, 200);
});

init();
</script>
</body>
</html>
